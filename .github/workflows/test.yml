name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install poppler (pdftotext, pdfinfo, pdftoppm)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -race -count=1

      - name: go test -coverprofile (informational)
        run: go test ./... -coverpkg=./... -coverprofile=cover.out
        continue-on-error: true

      - name: coverage summary
        if: always()
        run: |
          if [ -f cover.out ]; then
            go tool cover -func=cover.out | tail -1
          fi
